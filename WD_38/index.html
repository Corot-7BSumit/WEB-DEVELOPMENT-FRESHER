<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>
    <style>
        .black {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    This is a basic HTML page.
    <div class="container">
        <div id="box1" class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <button onclick="magic()">Click for Magic!</button>
    </div>
    <script>
        // function magic(){
        //     let b1=document.getElementById('box1')
        //     b1.innerHTML = "Magic Done"
        // }

        // function magic(){
        //     let b1=document.getElementsByClassName('box')
        //     for(element of b1){
        //         console.log(element)
        //         element.innerHTML = "This is " + element.innerHTML
        //     }
        // }
        function magic() {
            let divs = document.getElementsByTagName('div')
            for (element of divs) {
                // element.innerHTML = element.innerHTML + "<p> This is a good boy. </p>"
                element.classList.add('black')
            }
        }
    </script>
</body>

</html>
