<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set_TimeOuts&Intervals</title>
</head>

<body>
    <script>
        let i = 1
        setInterval(() => {
            console.log("Counter : " + i)
            i++
        }, 1500);
    </script>
</body>

</html>
