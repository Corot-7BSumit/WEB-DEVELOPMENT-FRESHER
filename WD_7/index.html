<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>

<body>
    <h1 style="color: brown;"><strong>Media files</strong></h1>
    <h2 style="color: rgb(222, 94, 9);">Audio file</h2>
    <audio src="a.mp3" controls>
        Your browser does not support audio element.
    </audio>
    <audio controls>
        <source src="a.mp3" type="audio/mpeg">
        Your browser does not support audio element.
    </audio>
    <div>
        <video width="320" src="harry.mp4" type="video/mp4" controls>
            Your browser does not support video element.
        </video>
        <video width="320" controls>
            <source src="harry.mp4" type="video/mp4">
            Your browser does not support video element.

        </video>
    </div>
</body>

</html>
